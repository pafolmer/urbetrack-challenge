# =============================================================================
# Docker Compose — Urbetrack MD5 Validator Stack
# =============================================================================
# Arquitectura:
#   Cliente → :80 Nginx (reverse proxy) → red interna → :8000 API (FastAPI)
#
# La API NO está expuesta al host. Solo Nginx escucha en puerto 80.

services:
  api:
    build: .
    networks:
      - internal
    restart: unless-stopped
    # No tiene "ports:" → aislada del host, solo accesible via red interna

  nginx:
    image: nginx:1.25-alpine
    ports:
      - "8080:80"              # Host:8080 → Nginx:80. Puerto no privilegiado, evita conflictos
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy    # Espera a que la API pase su HEALTHCHECK
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
