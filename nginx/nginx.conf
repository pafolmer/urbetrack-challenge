# =============================================================================
# Nginx Reverse Proxy — Urbetrack MD5 Validator
# =============================================================================
# Función: recibir tráfico externo en puerto 80 y reenviarlo al contenedor API
# en la red interna de Docker. La API nunca es accesible directamente desde el host.

# Definir el backend (upstream). "api" es el nombre del servicio en docker-compose.
# Docker Compose crea un DNS interno donde "api" resuelve a la IP del contenedor.
upstream api {
    server api:8000;
}

# Rate limiting: zona de memoria de 10MB para trackear IPs.
# Permite 10 requests por segundo por IP al endpoint de validación.
# MD5 consume CPU — esto previene abuso (DoS por cálculo intensivo).
limit_req_zone $binary_remote_addr zone=validate:10m rate=10r/s;

server {
    listen 80;
    server_name localhost;

    # --- Endpoint de validación MD5 (con rate limiting) ---
    location /validate-md5 {
        # burst=20: permite ráfagas de hasta 20 requests sin esperar
        # nodelay: no encola los requests del burst, los procesa inmediato
        # Si se supera burst → 429 Too Many Requests
        limit_req zone=validate burst=20 nodelay;
        limit_req_status 429;

        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # --- Todo lo demás (health, docs, openapi.json) sin rate limit ---
    location / {
        proxy_pass http://api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
